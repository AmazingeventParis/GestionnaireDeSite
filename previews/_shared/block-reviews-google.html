<style>
/* ═══════════════════════════════════════════
   BLOC AVIS GOOGLE — Shootnbox
   Usage : inclure ce fragment dans n'importe quelle section
   ═══════════════════════════════════════════ */
.snb-reviews {
  padding: 72px 24px;
  position: relative;
  overflow: hidden;
}

.snb-reviews__inner {
  max-width: 1200px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

/* Header */
.snb-reviews__header {
  text-align: center;
  margin-bottom: 48px;
}
.snb-reviews__tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #E51981;
  background: rgba(229,25,129,0.08);
  border: 1px solid rgba(229,25,129,0.2);
  border-radius: 50px;
  padding: 5px 14px;
  margin-bottom: 16px;
}
.snb-reviews__tag svg {
  width: 14px; height: 14px; fill: #E51981;
}
.snb-reviews__title {
  font-size: 42px;
  font-weight: 900;
  font-style: italic;
  line-height: 1.1;
  margin: 0 0 12px;
  color: #1a0a22;
}
.snb-reviews__title em {
  color: #E51981;
  font-style: italic;
}

/* Score global */
.snb-reviews__score {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: #fff;
  border: 1px solid rgba(229,25,129,0.12);
  border-radius: 50px;
  padding: 10px 24px;
  box-shadow: 0 4px 20px rgba(229,25,129,0.08);
}
.snb-reviews__score-num {
  font-size: 28px;
  font-weight: 900;
  color: #1a0a22;
  line-height: 1;
}
.snb-reviews__stars {
  display: flex;
  gap: 2px;
}
.snb-reviews__stars svg {
  width: 18px; height: 18px;
}
.snb-reviews__count {
  font-size: 13px;
  color: #666;
  font-weight: 500;
  white-space: nowrap;
}

/* Grille de cards */
.snb-reviews__grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 36px;
}

/* Card */
.snb-review-card {
  background: #fff;
  border: 1px solid rgba(0,0,0,0.07);
  border-radius: 14px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}
.snb-review-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 30px rgba(229,25,129,0.08);
}

.snb-review-card__top {
  display: flex;
  align-items: center;
  gap: 10px;
}
.snb-review-card__avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  object-fit: cover;
  background: linear-gradient(135deg, #E51981, #7828C8);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  flex-shrink: 0;
  overflow: hidden;
}
.snb-review-card__avatar img {
  width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
}
.snb-review-card__meta {
  flex: 1;
  min-width: 0;
}
.snb-review-card__author {
  font-size: 13px;
  font-weight: 700;
  color: #1a0a22;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.snb-review-card__time {
  font-size: 11px;
  color: #999;
}
.snb-review-card__stars {
  display: flex;
  gap: 1px;
}
.snb-review-card__stars svg {
  width: 14px; height: 14px;
}
.snb-review-card__text {
  font-size: 13px;
  line-height: 1.6;
  color: #555;
  flex: 1;
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* CTA Google */
.snb-reviews__cta {
  text-align: center;
}
.snb-reviews__cta a {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 13px 32px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  background: linear-gradient(135deg, #E51981, #c41470);
  box-shadow: 0 6px 24px rgba(229,25,129,0.3);
  text-decoration: none;
  transition: all 0.3s ease;
}
.snb-reviews__cta a:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(229,25,129,0.4);
}
.snb-reviews__cta a svg {
  width: 16px; height: 16px;
}

/* États loading / erreur */
.snb-reviews__loading {
  text-align: center;
  padding: 40px;
  color: #999;
  font-size: 14px;
}
.snb-reviews__error {
  text-align: center;
  padding: 24px;
  color: #999;
  font-size: 13px;
  background: rgba(0,0,0,0.03);
  border-radius: 10px;
}

/* Responsive */
@media (max-width: 900px) {
  .snb-reviews__grid { grid-template-columns: repeat(2, 1fr); }
  .snb-reviews__title { font-size: 32px; }
}
@media (max-width: 600px) {
  .snb-reviews { padding: 56px 16px; }
  .snb-reviews__grid { grid-template-columns: 1fr; }
  .snb-reviews__title { font-size: 26px; }
  .snb-reviews__score-num { font-size: 22px; }
}
</style>

<section class="snb-reviews">
  <div class="snb-reviews__inner">

    <div class="snb-reviews__header">
      <div class="snb-reviews__tag">
        <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        Avis clients
      </div>
      <h2 class="snb-reviews__title">Ce que disent nos <em>clients</em></h2>
      <div class="snb-reviews__score" id="snb-score" style="display:none">
        <span class="snb-reviews__score-num" id="snb-rating">—</span>
        <div class="snb-reviews__stars" id="snb-stars"></div>
        <span class="snb-reviews__count" id="snb-count"></span>
      </div>
    </div>

    <div class="snb-reviews__grid" id="snb-grid">
      <div class="snb-reviews__loading">Chargement des avis…</div>
    </div>

    <div class="snb-reviews__cta">
      <a href="#" id="snb-google-link" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.35 11.1H12.18V13.83H18.69C18.36 17.64 15.19 19.27 12.19 19.27C8.36 19.27 5 16.25 5 12C5 7.9 8.2 4.73 12.2 4.73C15.29 4.73 17.1 6.7 17.1 6.7L19 4.72C19 4.72 16.56 2 12.1 2C6.42 2 2.03 6.8 2.03 12C2.03 17.05 6.16 22 12.25 22C17.6 22 21.5 18.33 21.5 12.91C21.5 11.76 21.35 11.1 21.35 11.1Z"/></svg>
        Voir tous les avis sur Google
      </a>
    </div>

  </div>
</section>

<script>
(function() {
  function starsSVG(n) {
    return Array.from({length: 5}, (_, i) => {
      const filled = i < n;
      return `<svg viewBox="0 0 24 24" fill="${filled ? '#F59E0B' : '#E5E7EB'}">
        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
      </svg>`;
    }).join('');
  }

  function initial(name) {
    return (name || '?').charAt(0).toUpperCase();
  }

  function gradientColor(name) {
    const colors = ['#E51981,#7828C8','#0250FF,#7828C8','#FF7A00,#E51981','#16A34A,#0250FF','#7828C8,#E51981'];
    const i = (name || '').charCodeAt(0) % colors.length;
    return colors[i];
  }

  fetch('/api/reviews')
    .then(r => r.json())
    .then(data => {
      if (data.error) throw new Error(data.error);

      // Score global
      const scoreEl = document.getElementById('snb-score');
      document.getElementById('snb-rating').textContent = data.rating.toFixed(1).replace('.', ',');
      document.getElementById('snb-stars').innerHTML = starsSVG(Math.round(data.rating));
      document.getElementById('snb-count').textContent = data.totalRatings.toLocaleString('fr-FR') + ' avis';
      scoreEl.style.display = 'inline-flex';

      // Lien Google
      if (data.googleUrl) {
        document.getElementById('snb-google-link').href = data.googleUrl;
      }

      // Cards
      const grid = document.getElementById('snb-grid');
      if (!data.reviews || !data.reviews.length) {
        grid.innerHTML = '<div class="snb-reviews__error">Aucun avis disponible pour le moment.</div>';
        return;
      }

      grid.innerHTML = data.reviews.map(r => `
        <div class="snb-review-card">
          <div class="snb-review-card__top">
            <div class="snb-review-card__avatar" style="background:linear-gradient(135deg,${gradientColor(r.author)})">
              ${r.avatar
                ? `<img src="${r.avatar}" alt="${r.author}" loading="lazy">`
                : initial(r.author)
              }
            </div>
            <div class="snb-review-card__meta">
              <div class="snb-review-card__author">${r.author}</div>
              <div class="snb-review-card__time">${r.time}</div>
            </div>
            <div class="snb-review-card__stars">${starsSVG(r.rating)}</div>
          </div>
          <p class="snb-review-card__text">${r.text.replace(/</g,'&lt;')}</p>
        </div>
      `).join('');
    })
    .catch(err => {
      document.getElementById('snb-grid').innerHTML =
        `<div class="snb-reviews__error">Les avis ne peuvent pas être chargés actuellement.</div>`;
      console.warn('[snb-reviews]', err.message);
    });
})();
</script>
