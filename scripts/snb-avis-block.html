<style>
.snb-avis{padding:50px 20px;background:linear-gradient(135deg,#FFF8EE 0%,#fff0f8 40%,#FFF8EE 70%,#f0f0ff 100%);font-family:"Raleway",sans-serif;position:relative;}
.snb-avis *{box-sizing:border-box;}
.snb-avis__header{max-width:1100px;margin:0 auto 32px;text-align:center;padding:0 20px;position:relative;z-index:1;}
.snb-avis__title{font-size:36px;font-weight:900;font-style:italic;color:#323338;line-height:1.15;margin:0 0 10px;letter-spacing:-0.3px;}
.snb-avis__title em{color:#E51981;font-style:italic;}
@media(max-width:600px){.snb-avis__title{font-size:24px;}}
.snb-avis .avis-inner{max-width:1100px;margin:0 auto;display:flex;gap:30px;align-items:center;}
.snb-avis .avis-business{flex-shrink:0;width:240px;background:#fff;border-radius:20px;padding:28px 24px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.06);border:1.5px solid rgba(229,25,129,0.08);}
.snb-avis .biz-icon{width:50px;height:50px;margin:0 auto 12px;background:linear-gradient(135deg,#4285F4,#0250FF);border-radius:12px;display:flex;align-items:center;justify-content:center;}
.snb-avis .biz-icon svg{width:28px;height:28px;}
.snb-avis .biz-label{font-size:13px;font-weight:800;color:#2B63C6;margin-bottom:2px;}
.snb-avis .biz-name{font-size:16px;font-weight:900;color:#323338;line-height:1.2;margin-bottom:10px;}
.snb-avis .biz-rating{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:4px;}
.snb-avis .biz-rating .rating-num{font-size:28px;font-weight:900;color:#323338;}
.snb-avis .biz-rating .stars{display:flex;gap:2px;}
.snb-avis .biz-rating .stars svg{width:18px;height:18px;}
.snb-avis .biz-count{font-size:12px;color:#666;margin-bottom:16px;}
.snb-avis .biz-count .g-logo{width:14px;height:14px;vertical-align:-2px;margin-left:2px;}
.snb-avis .biz-buttons{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.snb-avis .biz-btn{display:inline-flex;align-items:center;gap:4px;padding:8px 14px;border-radius:20px;font-size:11px;font-weight:700;text-decoration:none;transition:all 0.3s ease;position:relative;overflow:hidden;}
.snb-avis .btn-primary{background:linear-gradient(135deg,#E51981,#c0137a);color:#fff;border:none;}
.snb-avis .btn-outline{background:linear-gradient(135deg,#E51981,#ff3fac);color:#fff;border:none;box-shadow:0 4px 12px rgba(229,25,129,0.3);}
.snb-avis .biz-btn .g-logo{width:12px;height:12px;}
.snb-avis .avis-carousel{flex:1;position:relative;min-width:0;padding:0 44px;overflow:hidden;}
.snb-avis .avis-track{display:flex;gap:16px;overflow-x:auto;scroll-behavior:smooth;scroll-snap-type:x mandatory;scrollbar-width:none;}
.snb-avis .avis-track::-webkit-scrollbar{display:none;}
.snb-avis .avis-card{flex:0 0 calc(33.33% - 11px);scroll-snap-align:start;background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.05);border:1.5px solid rgba(0,0,0,0.04);transition:all 0.3s ease;}
.snb-avis .avis-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(229,25,129,0.12);border-color:rgba(229,25,129,0.15);}
.snb-avis .avis-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.snb-avis .avis-avatar{width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.snb-avis .avis-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.snb-avis .avis-avatar .initials{font-size:16px;font-weight:800;color:#fff;}
.snb-avis .avis-meta{flex:1;min-width:0;}
.snb-avis .avis-name{display:block;font-size:13px;font-weight:700;color:#323338;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.snb-avis .avis-time{display:block;font-size:11px;color:#888;margin-top:1px;}
.snb-avis .avis-google{width:20px;height:20px;flex-shrink:0;}
.snb-avis .avis-stars{display:flex;gap:2px;margin-bottom:8px;}
.snb-avis .avis-stars svg{width:16px;height:16px;}
.snb-avis .avis-text{font-size:13px;line-height:1.5;color:#555;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;margin:0;}
.snb-avis .avis-nav{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;background:#fff;border:1.5px solid rgba(229,25,129,0.15);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,0.08);transition:all 0.3s;}
.snb-avis .avis-nav:hover{background:linear-gradient(135deg,#E51981,#c0137a);border-color:#E51981;}
.snb-avis .avis-nav:hover svg{stroke:#fff;}
.snb-avis .avis-nav svg{width:16px;height:16px;stroke:#E51981;stroke-width:2.5;fill:none;}
.snb-avis .nav-prev{left:0;}
.snb-avis .nav-next{right:0;}
.snb-avis .avis-loading{padding:40px;text-align:center;color:#888;font-size:14px;width:100%;}
@media(max-width:900px){.snb-avis .avis-card{flex:0 0 calc(50% - 8px);}}
@media(max-width:768px){.snb-avis .avis-inner{flex-direction:column;gap:20px;align-items:center;}.snb-avis .avis-business{width:100%;max-width:90%;}.snb-avis .avis-nav{display:none !important;}.snb-avis .avis-carousel{width:100%;padding:0;overflow:hidden;}.snb-avis .avis-card{flex:0 0 85vw;min-width:85vw;max-width:85vw;}}
@media(max-width:480px){.snb-avis{padding:30px 16px;}.snb-avis .avis-business{max-width:90%;padding:22px 18px;}.snb-avis .biz-name{font-size:15px;}.snb-avis .biz-rating .rating-num{font-size:24px;}.snb-avis .avis-card{padding:16px;}.snb-avis .avis-text{font-size:12px;}}
</style>

<section class="snb-avis" aria-labelledby="snb-avis-title">
<header class="snb-avis__header">
<h2 class="snb-avis__title" id="snb-avis-title">Ils ont choisi <em>Shootnbox</em> et partagent leur expérience</h2>
</header>
<div class="avis-inner">
<div class="avis-business">
<div class="biz-icon"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9z" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"></path><path d="M9 22V12h6v10" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path></svg></div>
<div class="biz-label">Excellent</div>
<div class="biz-name">ShootnBox : Photobooth</div>
<div class="biz-rating"><span class="rating-num" id="snb-avis-biz-rating">4,8</span><span class="stars" id="snb-avis-biz-stars"></span></div>
<div class="biz-count">Basé sur <span id="snb-avis-biz-count">1 192</span> avis <svg class="g-logo" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path></svg></div>
<div class="biz-buttons">
<a href="https://www.google.com/maps/place/ShootnBox" id="snb-avis-biz-link" target="_blank" class="biz-btn btn-primary" rel="noopener noreferrer">Voir tous les avis</a>
<a href="https://search.google.com/local/writereview?placeid=ChIJYTN4e3Bx5kcRIG4bJMuaZlA" id="snb-avis-write-link" target="_blank" class="biz-btn btn-outline" rel="noopener noreferrer">Évaluez-nous</a>
</div>
</div>
<div class="avis-carousel">
<button type="button" class="avis-nav nav-prev" id="snbAvisPrev" aria-label="Avis précédents"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
<button type="button" class="avis-nav nav-next" id="snbAvisNext" aria-label="Avis suivants"><svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"></polyline></svg></button>
<div class="avis-track" id="snbAvisTrack"><div class="avis-loading">Chargement des avis…</div></div>
</div>
</div>
</section>

<script>
(function(){
var GRADIENTS=['#E51981,#c0137a','#0250FF,#0140cc','#7828C8,#6020a8','#FF7A00,#e06b00','#34A853,#2d8f47','#EA4335,#d03a2f'];
var STAR_FILLED='<svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" fill="#FBBC04" stroke="#FBBC04" stroke-width="1"></polygon></svg>';
var STAR_EMPTY='<svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1"></polygon></svg>';
var GOOGLE_SVG='<svg class="avis-google" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path></svg>';
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function stars(n){var h='';for(var i=0;i<5;i++)h+=(i<n?STAR_FILLED:STAR_EMPTY);return h;}
function gradientFor(name){return GRADIENTS[(name||'?').charCodeAt(0)%GRADIENTS.length];}
function parseFrTimeToISO(t){if(!t)return null;var m=/il y a (\d+)\s*(jour|semaine|mois|an)/i.exec(t);if(!m)return null;var n=parseInt(m[1],10),u=m[2].toLowerCase(),d=new Date();if(u.indexOf('jour')===0)d.setDate(d.getDate()-n);else if(u.indexOf('semaine')===0)d.setDate(d.getDate()-n*7);else if(u.indexOf('mois')===0)d.setMonth(d.getMonth()-n);else d.setFullYear(d.getFullYear()-n);return d.toISOString().split('T')[0];}
function renderCard(r){var grad=gradientFor(r.author),initial=(r.author||'?').charAt(0).toUpperCase(),iso=parseFrTimeToISO(r.time);var avatar=r.avatar?'<img src="'+esc(r.avatar)+'" alt="'+esc(r.author)+'" loading="lazy">':'<span class="initials">'+esc(initial)+'</span>';return '<article class="avis-card"><div class="avis-header"><div class="avis-avatar" style="background:linear-gradient(135deg,'+grad+')">'+avatar+'</div><div class="avis-meta"><span class="avis-name">'+esc(r.author)+'</span><span class="avis-time">'+esc(r.time||'')+'</span></div>'+GOOGLE_SVG+'</div><div class="avis-stars">'+stars(r.rating||5)+'</div><p class="avis-text">'+esc(r.text||'')+'</p></article>';}
fetch('/api/reviews').then(function(r){return r.json();}).then(function(data){if(!data||!data.reviews)throw new Error('no data');var reviews=data.reviews;var rating=parseFloat(data.rating||4.8);var total=parseInt(data.totalRatings||reviews.length,10);var br=document.getElementById('snb-avis-biz-rating');if(br)br.textContent=rating.toFixed(1).replace('.',',');var bs=document.getElementById('snb-avis-biz-stars');if(bs)bs.innerHTML=stars(Math.round(rating));var bc=document.getElementById('snb-avis-biz-count');if(bc)bc.textContent=total.toLocaleString('fr-FR');if(data.googleUrl){var bl=document.getElementById('snb-avis-biz-link');if(bl)bl.href=data.googleUrl;}if(data.writeReviewUrl){var wl=document.getElementById('snb-avis-write-link');if(wl)wl.href=data.writeReviewUrl;}var track=document.getElementById('snbAvisTrack');if(track){if(!reviews.length){track.innerHTML='<div class="avis-loading">Aucun avis disponible.</div>';return;}track.innerHTML=reviews.map(renderCard).join('');}var prev=document.getElementById('snbAvisPrev'),next=document.getElementById('snbAvisNext');function scrollStep(){return track?Math.max(280,track.clientWidth*0.8):300;}if(prev&&track)prev.addEventListener('click',function(){track.scrollBy({left:-scrollStep(),behavior:'smooth'});});if(next&&track)next.addEventListener('click',function(){track.scrollBy({left:scrollStep(),behavior:'smooth'});});}).catch(function(err){var track=document.getElementById('snbAvisTrack');if(track)track.innerHTML='<div class="avis-loading">Avis indisponibles pour le moment.</div>';});
})();
</script>
