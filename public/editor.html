<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editeur - Gestionnaire de Site</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/responsive-preview.css">
  <style>
    body { overflow: hidden; }

    /* Top bar */
    .editor-topbar {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 0 16px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
    }
    .editor-topbar-brand {
      font-size: 15px;
      font-weight: 700;
      color: #e6edf3;
      margin-right: 8px;
      white-space: nowrap;
    }
    .editor-topbar-brand span { color: #58a6ff; }
    .editor-topbar-divider {
      width: 1px;
      height: 24px;
      background: #30363d;
    }
    .page-selector {
      background: #0d1117;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      min-width: 140px;
    }
    .page-selector:focus {
      border-color: #58a6ff;
      outline: none;
      box-shadow: 0 0 0 2px #58a6ff33;
    }
    .page-selector option { background: #0d1117; }

    .editor-topbar-spacer { flex: 1; }

    .changes-badge {
      background: #d29922;
      color: #0d1117;
      font-size: 12px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      display: none;
    }
    .changes-badge.visible { display: inline-block; }

    .topbar-btn {
      background: #21262d;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .topbar-btn:hover { background: #30363d; }
    .topbar-btn-seo { color: #d2a8ff; border-color: #8b5cf644; }
    .topbar-btn-seo:hover { background: #8b5cf622; }

    .btn-save {
      background: #1f6feb;
      border-color: #388bfd44;
      color: #fff;
    }
    .btn-save:hover { background: #388bfd; }

    .btn-publish {
      background: #238636;
      border-color: #2ea04366;
      color: #fff;
    }
    .btn-publish:hover { background: #2ea043; }
    .btn-publish:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .topbar-btn-logout {
      color: #f85149;
      border-color: #f8514933;
    }
    .topbar-btn-logout:hover { background: #f8514922; }

    /* Main content area */
    .editor-main {
      position: fixed;
      top: 52px;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      background: #010409;
    }

    /* Responsive toolbar area */
    .editor-toolbar-area {
      flex-shrink: 0;
    }

    /* Iframe area */
    .editor-iframe-area {
      flex: 1;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 16px;
    }

    #editor-frame {
      border: none;
      background: #ffffff;
      transition: width 0.3s, height 0.3s;
      border-radius: 4px;
      box-shadow: 0 0 0 1px #30363d, 0 8px 32px rgba(0,0,0,0.4);
    }

    /* SEO Panel */
    .seo-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #161b22;
      border-top: 1px solid #30363d;
      padding: 20px 24px;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      z-index: 90;
      max-height: 50vh;
      overflow-y: auto;
    }
    .seo-panel.open { transform: translateY(0); }
    .seo-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .seo-panel-title {
      font-size: 16px;
      font-weight: 600;
      color: #e6edf3;
    }
    .seo-panel-close {
      background: none;
      border: none;
      color: #8b949e;
      cursor: pointer;
      font-size: 20px;
      padding: 4px;
    }
    .seo-panel-close:hover { color: #e6edf3; }
    .seo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .seo-field { display: flex; flex-direction: column; gap: 4px; }
    .seo-field label {
      font-size: 12px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .seo-field input, .seo-field textarea {
      background: #0d1117;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }
    .seo-field input:focus, .seo-field textarea:focus {
      border-color: #58a6ff;
      outline: none;
      box-shadow: 0 0 0 2px #58a6ff33;
    }
    .seo-field textarea { resize: vertical; min-height: 60px; }
    .seo-preview {
      grid-column: 1 / -1;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      margin-top: 8px;
    }
    .seo-preview-title {
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .seo-preview-google {
      font-family: Arial, sans-serif;
    }
    .seo-preview-google .title {
      color: #8ab4f8;
      font-size: 18px;
      line-height: 1.3;
      margin-bottom: 4px;
      cursor: pointer;
    }
    .seo-preview-google .url {
      color: #bdc1c6;
      font-size: 13px;
      margin-bottom: 4px;
    }
    .seo-preview-google .desc {
      color: #bdc1c6;
      font-size: 14px;
      line-height: 1.5;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .editor-topbar { padding: 0 8px; gap: 6px; }
      .topbar-btn span.btn-label { display: none; }
      .page-selector { min-width: 100px; }
      .seo-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- Top bar -->
  <div class="editor-topbar">
    <a href="/pages.html" class="editor-topbar-brand">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="#8b949e" style="vertical-align: -2px; margin-right: 4px;"><path d="M7.78 12.53a.75.75 0 01-1.06 0L2.47 8.28a.75.75 0 010-1.06l4.25-4.25a.75.75 0 011.06 1.06L4.81 7h7.44a.75.75 0 010 1.5H4.81l2.97 2.97a.75.75 0 010 1.06z"/></svg>
      Pages
    </a>
    <div class="editor-topbar-divider"></div>
    <select class="page-selector" id="page-selector" title="Changer de page">
      <option value="">Chargement...</option>
    </select>
    <div class="editor-topbar-spacer"></div>
    <span class="changes-badge" id="changes-badge">0 modif.</span>
    <button class="topbar-btn topbar-btn-seo" id="btn-seo" title="SEO">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8s3.58 8 8 8 8-3.58 8-8-3.58-8-8-8zm0 14.5a6.5 6.5 0 110-13 6.5 6.5 0 010 13zM6.5 5a1 1 0 112 0 1 1 0 01-2 0zM7 7.5a.75.75 0 011.5 0v4a.75.75 0 01-1.5 0z"/></svg>
      <span class="btn-label">SEO</span>
    </button>
    <button class="topbar-btn" id="btn-history" title="Historique / Backup" style="background:#21262d;border-color:#30363d;">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M1.705 8.005a.75.75 0 01.834.656 5.5 5.5 0 009.592 2.97l-1.204-1.204a.25.25 0 01.177-.427h3.646a.25.25 0 01.25.25v3.646a.25.25 0 01-.427.177l-1.38-1.38A7.002 7.002 0 011.05 8.84a.75.75 0 01.656-.834zM8 2.5a5.487 5.487 0 00-4.131 1.869l1.204 1.204A.25.25 0 014.896 6H1.25A.25.25 0 011 5.75V2.104a.25.25 0 01.427-.177l1.38 1.38A7.002 7.002 0 0114.95 7.16a.75.75 0 11-1.49.178A5.5 5.5 0 008 2.5z"/></svg>
      <span class="btn-label">Historique</span>
    </button>
    <button class="topbar-btn btn-save" id="btn-save" title="Sauvegarder">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M5.75 1a.75.75 0 00-.75.75v3c0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75v-3a.75.75 0 00-.75-.75h-4.5zm.75 3V2.5h3V4h-3zm-2.874-.467a.75.75 0 00-.752.75v7.5a.75.75 0 001.5 0V9h7.252v2.783a.75.75 0 001.5 0v-7.5a.75.75 0 00-.752-.75H3.626zM12.876 7.5H3.124V5.033h9.752V7.5z"/></svg>
      <span class="btn-label">Sauvegarder</span>
    </button>
    <button class="topbar-btn btn-publish" id="btn-publish" title="Publier">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M1 7.775V2.75C1 1.784 1.784 1 2.75 1h5.025c.464 0 .91.184 1.238.513l6.25 6.25a1.75 1.75 0 010 2.474l-5.026 5.026a1.75 1.75 0 01-2.474 0l-6.25-6.25A1.752 1.752 0 011 7.775zM5 5a1 1 0 100-2 1 1 0 000 2z"/></svg>
      <span class="btn-label">Publier</span>
    </button>
    <button class="topbar-btn topbar-btn-logout" id="btn-logout" title="Deconnexion">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M2 2.75C2 1.784 2.784 1 3.75 1h8.5c.966 0 1.75.784 1.75 1.75v10.5A1.75 1.75 0 0112.25 15h-8.5A1.75 1.75 0 012 13.25zm6.56 4.5l1.97-1.97a.75.75 0 10-1.06-1.06L6.22 7.47a.75.75 0 000 1.06l3.25 3.25a.75.75 0 101.06-1.06L8.56 8.75H13a.75.75 0 000-1.5z"/></svg>
    </button>
  </div>

  <!-- Main content -->
  <div class="editor-main">
    <div class="editor-toolbar-area" id="responsive-toolbar"></div>
    <div class="editor-iframe-area" id="iframe-area">
      <iframe id="editor-frame" src="about:blank" width="1920" height="1080"></iframe>
    </div>
  </div>

  <!-- SEO Panel -->
  <div class="seo-panel" id="seo-panel">
    <div class="seo-panel-header">
      <span class="seo-panel-title">Parametres SEO</span>
      <button class="seo-panel-close" id="seo-close">&times;</button>
    </div>
    <div class="seo-grid">
      <div class="seo-field">
        <label for="seo-title">Titre de la page</label>
        <input type="text" id="seo-title" placeholder="Titre pour les moteurs de recherche" maxlength="70">
      </div>
      <div class="seo-field">
        <label for="seo-og-title">og:title (reseaux sociaux)</label>
        <input type="text" id="seo-og-title" placeholder="Titre pour le partage social" maxlength="70">
      </div>
      <div class="seo-field">
        <label for="seo-description">Meta description</label>
        <textarea id="seo-description" placeholder="Description pour les moteurs de recherche" maxlength="160"></textarea>
      </div>
      <div class="seo-field">
        <label for="seo-og-description">og:description</label>
        <textarea id="seo-og-description" placeholder="Description pour le partage social" maxlength="200"></textarea>
      </div>
      <div class="seo-preview">
        <div class="seo-preview-title">Apercu Google</div>
        <div class="seo-preview-google">
          <div class="title" id="seo-preview-title">Titre de la page</div>
          <div class="url" id="seo-preview-url">https://example.com/page</div>
          <div class="desc" id="seo-preview-desc">Description de la page...</div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="/js/auth.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/responsive-preview.js"></script>
  <script>
    (function() {
      'use strict';

      var currentSlug = '';
      var currentUser = null;
      var changes = [];
      var seoData = { title: '', description: '', ogTitle: '', ogDescription: '' };
      var seoPanel = document.getElementById('seo-panel');

      /**
       * Get slug from URL params.
       */
      function getSlugFromUrl() {
        var params = new URLSearchParams(window.location.search);
        return params.get('slug') || 'home';
      }

      /**
       * Load the page list for the page selector dropdown.
       */
      async function loadPageList() {
        try {
          var response = await Auth.apiFetch('/api/pages');
          if (!response.ok) throw new Error('Erreur');
          var data = await response.json();
          var selector = document.getElementById('page-selector');
          selector.innerHTML = '';
          var pages = data.pages || [];
          for (var i = 0; i < pages.length; i++) {
            var opt = document.createElement('option');
            opt.value = pages[i].slug;
            opt.textContent = pages[i].name;
            if (pages[i].slug === currentSlug) opt.selected = true;
            selector.appendChild(opt);
          }
        } catch (err) {
          console.error('Failed to load page list:', err);
        }
      }

      /**
       * Load page data and set up the editor iframe.
       */
      async function loadPage(slug) {
        currentSlug = slug;
        changes = [];
        updateChangesBadge();

        var frame = document.getElementById('editor-frame');
        var _siteParam = '';
        try {
          var _sid = localStorage.getItem('gds_active_site');
          if (_sid && _sid !== 'shootnbox') _siteParam = '&site=' + encodeURIComponent(_sid);
        } catch(e) {}
        frame.src = '/api/pages/' + encodeURIComponent(slug) + '/preview?edit=1' + _siteParam;

        // Load SEO data
        try {
          var response = await Auth.apiFetch('/api/pages/' + encodeURIComponent(slug));
          if (response.ok) {
            var data = await response.json();
            seoData = data.seo || { title: '', description: '', ogTitle: '', ogDescription: '' };
            populateSeoFields();
          }
        } catch (err) {
          console.error('Failed to load page data:', err);
        }
      }

      /**
       * Populate SEO form fields from seoData.
       */
      function populateSeoFields() {
        document.getElementById('seo-title').value = seoData.title || '';
        document.getElementById('seo-description').value = seoData.description || '';
        document.getElementById('seo-og-title').value = seoData.ogTitle || '';
        document.getElementById('seo-og-description').value = seoData.ogDescription || '';
        updateSeoPreview();
      }

      /**
       * Collect SEO data from form fields.
       */
      function collectSeoData() {
        return {
          title: document.getElementById('seo-title').value,
          description: document.getElementById('seo-description').value,
          ogTitle: document.getElementById('seo-og-title').value,
          ogDescription: document.getElementById('seo-og-description').value
        };
      }

      /**
       * Update the Google preview in the SEO panel.
       */
      function updateSeoPreview() {
        var title = document.getElementById('seo-title').value || 'Titre de la page';
        var desc = document.getElementById('seo-description').value || 'Description de la page...';
        var domain = window.location.hostname;
        var urlPath = currentSlug === 'home' ? '' : currentSlug;
        document.getElementById('seo-preview-title').textContent = title;
        document.getElementById('seo-preview-url').textContent = 'https://' + domain + '/' + urlPath;
        document.getElementById('seo-preview-desc').textContent = desc;
      }

      /**
       * Update the changes badge.
       */
      function updateChangesBadge() {
        var badge = document.getElementById('changes-badge');
        if (changes.length > 0) {
          badge.textContent = changes.length + ' modif.';
          badge.classList.add('visible');
        } else {
          badge.classList.remove('visible');
        }
      }

      /**
       * Send command to iframe editor.
       */
      function sendToIframe(type, data) {
        var frame = document.getElementById('editor-frame');
        if (frame && frame.contentWindow) {
          frame.contentWindow.postMessage({ source: 'gds-parent', type: type, ...data }, '*');
        }
      }

      /**
       * Save changes — saves text edits to preview files (no rebuild/deploy).
       */
      async function saveChanges() {
        var seo = collectSeoData();
        var btn = document.getElementById('btn-save');
        btn.disabled = true;
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style="animation:spin 1s linear infinite"><path d="M8 0a8 8 0 100 16A8 8 0 008 0zm0 14.5a6.5 6.5 0 110-13 6.5 6.5 0 010 13z" opacity=".3"/><path d="M8 0a8 8 0 018 8h-1.5A6.5 6.5 0 008 1.5V0z"/></svg><span class="btn-label">Sauvegarde...</span>';

        sendToIframe('save');

        try {
          var response = await Auth.apiFetch('/api/pages/' + encodeURIComponent(currentSlug) + '/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ changes: [], seo: seo })
          });
          var data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || 'Erreur ' + response.status);
          }
          changes = [];
          updateChangesBadge();

          // Reload iframe to show updated content
          var frame = document.getElementById('editor-frame');
          if (frame) frame.src = frame.src;

          // Guardian 1: Show SEO warnings from save response
          if (data.seoWarnings && data.seoWarnings.length > 0) {
            showSeoNotification('Sauvegarde OK — Warnings SEO detectes', data.seoWarnings, 'warning');
          } else {
            Components.showToast('Brouillon sauvegarde', 'success');
          }
        } catch (err) {
          Components.showToast('Erreur: ' + err.message, 'error');
        } finally {
          btn.disabled = false;
          btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M5.75 1a.75.75 0 00-.75.75v3c0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75v-3a.75.75 0 00-.75-.75h-4.5zm.75 3V2.5h3V4h-3zm-2.874-.467a.75.75 0 00-.752.75v7.5a.75.75 0 001.5 0V9h7.252v2.783a.75.75 0 001.5 0v-7.5a.75.75 0 00-.752-.75H3.626zM12.876 7.5H3.124V5.033h9.752V7.5z"/></svg><span class="btn-label">Sauvegarder</span>';
        }
      }

      /**
       * Publish page — save first, then rebuild and deploy.
       */
      async function publishPage(forcePublish) {
        if (!forcePublish && !confirm('Publier cette page ? Les modifications seront visibles sur le site.')) return;

        await saveChanges();
        sendToIframe('publish');

        var btn = document.getElementById('btn-publish');
        btn.disabled = true;
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style="animation:spin 1s linear infinite"><path d="M8 0a8 8 0 100 16A8 8 0 008 0zm0 14.5a6.5 6.5 0 110-13 6.5 6.5 0 010 13z" opacity=".3"/><path d="M8 0a8 8 0 018 8h-1.5A6.5 6.5 0 008 1.5V0z"/></svg><span class="btn-label">Publication...</span>';
        try {
          var url = '/api/pages/' + encodeURIComponent(currentSlug) + '/publish' + (forcePublish ? '?force=true' : '');
          var response = await Auth.apiFetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
          });
          var data = await response.json();

          if (response.status === 409 && data.canForce) {
            // Guardian 2: SEO errors block publish — show notification with force option
            showSeoNotification(
              'Publication bloquee — Erreurs SEO',
              (data.publishErrors || []).concat(data.publishWarnings || []),
              'error',
              function() { publishPage(true); } // Force callback
            );
            return;
          }

          if (!response.ok) {
            // Build error or other server error — show detailed notification
            var details = [];
            if (data.details) details.push(typeof data.details === 'string' ? data.details : JSON.stringify(data.details));
            if (data.buildOutput) details.push(data.buildOutput.slice(-500));
            showSeoNotification(data.error || 'Erreur de publication', details.length ? details : [data.error || 'Erreur inconnue'], 'error');
            return;
          }

          // Success — show warnings if any
          var allWarnings = (data.publishWarnings || []).concat(data.buildWarnings || []);
          if (allWarnings.length > 0) {
            showSeoNotification('Page publiee — Warnings detectes', allWarnings, 'warning');
          } else {
            Components.showToast('Page publiee avec succes', 'success');
          }
        } catch (err) {
          Components.showToast('Erreur reseau: ' + err.message, 'error');
        } finally {
          btn.disabled = false;
          btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M1 7.775V2.75C1 1.784 1.784 1 2.75 1h5.025c.464 0 .91.184 1.238.513l6.25 6.25a1.75 1.75 0 010 2.474l-5.026 5.026a1.75 1.75 0 01-2.474 0l-6.25-6.25A1.752 1.752 0 011 7.775zM5 5a1 1 0 100-2 1 1 0 000 2z"/></svg><span class="btn-label">Publier</span>';
        }
      }

      // ==================== SEO Notification Modal ====================
      function showSeoNotification(title, items, type, forceCallback) {
        // Remove existing notification
        var existing = document.getElementById('seo-notification');
        if (existing) existing.remove();

        var overlay = document.createElement('div');
        overlay.id = 'seo-notification';
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px';

        var borderColor = type === 'error' ? '#f85149' : type === 'warning' ? '#d29922' : '#3fb950';
        var iconSvg = type === 'error'
          ? '<svg width="24" height="24" viewBox="0 0 16 16" fill="#f85149"><path d="M2.343 13.657A8 8 0 1113.657 2.343 8 8 0 012.343 13.657zM6.03 4.97a.75.75 0 00-1.06 1.06L6.94 8 4.97 9.97a.75.75 0 101.06 1.06L8 9.06l1.97 1.97a.75.75 0 101.06-1.06L9.06 8l1.97-1.97a.75.75 0 10-1.06-1.06L8 6.94 6.03 4.97z"/></svg>'
          : '<svg width="24" height="24" viewBox="0 0 16 16" fill="#d29922"><path d="M6.457 1.047c.659-1.234 2.427-1.234 3.086 0l6.082 11.378A1.75 1.75 0 0114.082 15H1.918a1.75 1.75 0 01-1.543-2.575L6.457 1.047zM8 5a.75.75 0 00-.75.75v2.5a.75.75 0 001.5 0v-2.5A.75.75 0 008 5zm1 6a1 1 0 11-2 0 1 1 0 012 0z"/></svg>';

        var html = '<div style="background:#161b22;border:2px solid ' + borderColor + ';border-radius:12px;max-width:600px;width:100%;max-height:80vh;overflow-y:auto">' +
          '<div style="padding:20px 24px;border-bottom:1px solid #21262d;display:flex;align-items:center;gap:12px">' +
          iconSvg +
          '<h3 style="color:#e6edf3;font-size:16px;font-weight:600;margin:0;flex:1">' + title + '</h3>' +
          '<button id="seo-notif-close" style="background:none;border:none;color:#8b949e;font-size:20px;cursor:pointer;padding:4px">&times;</button></div>' +
          '<div style="padding:16px 24px">';

        for (var i = 0; i < items.length; i++) {
          var isError = items[i].toLowerCase && (items[i].toLowerCase().startsWith('critique') || items[i].toLowerCase().startsWith('aucun'));
          var itemColor = isError ? '#f85149' : '#d29922';
          var itemIcon = isError ? '&#10007;' : '&#9888;';
          html += '<div style="display:flex;align-items:flex-start;gap:8px;padding:8px 12px;background:' + (isError ? '#f8514912' : '#d2992212') + ';border-radius:6px;margin-bottom:6px;border:1px solid #21262d">' +
            '<span style="color:' + itemColor + ';font-weight:700;flex-shrink:0">' + itemIcon + '</span>' +
            '<span style="color:#e6edf3;font-size:13px;line-height:1.5">' + items[i] + '</span></div>';
        }

        html += '</div><div style="padding:12px 24px 20px;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid #21262d">';
        if (forceCallback) {
          html += '<button id="seo-notif-force" style="padding:8px 20px;background:#d29922;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Publier quand meme</button>';
          html += '<button id="seo-notif-ok" style="padding:8px 20px;background:#21262d;color:#e6edf3;border:1px solid #30363d;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Corriger</button>';
        } else {
          html += '<button id="seo-notif-ok" style="padding:8px 20px;background:#238636;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">OK, compris</button>';
        }
        html += '</div></div>';

        overlay.innerHTML = html;
        document.body.appendChild(overlay);

        document.getElementById('seo-notif-close').addEventListener('click', function() { overlay.remove(); });
        document.getElementById('seo-notif-ok').addEventListener('click', function() { overlay.remove(); });
        if (forceCallback) {
          document.getElementById('seo-notif-force').addEventListener('click', function() { overlay.remove(); forceCallback(); });
        }
        overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
      }

      // ==================== Event Listeners ====================

      // Page selector change
      document.getElementById('page-selector').addEventListener('change', function() {
        var slug = this.value;
        if (slug && slug !== currentSlug) {
          if (changes.length > 0 && !confirm('Vous avez des modifications non sauvegardees. Continuer ?')) {
            this.value = currentSlug;
            return;
          }
          window.history.replaceState(null, '', '/editor.html?slug=' + encodeURIComponent(slug));
          loadPage(slug);
        }
      });

      // SEO panel toggle
      document.getElementById('btn-seo').addEventListener('click', function() {
        seoPanel.classList.toggle('open');
      });
      document.getElementById('seo-close').addEventListener('click', function() {
        seoPanel.classList.remove('open');
      });

      // SEO fields live preview
      ['seo-title', 'seo-description', 'seo-og-title', 'seo-og-description'].forEach(function(id) {
        document.getElementById(id).addEventListener('input', updateSeoPreview);
      });

      // History / Backup
      document.getElementById('btn-history').addEventListener('click', async function() {
        var slug = currentSlug;
        if (!slug) return;
        // Open history modal — reuse the pattern from admin-editor.js
        var existing = document.getElementById('gds-history-modal');
        if (existing) existing.remove();

        var overlay = document.createElement('div');
        overlay.id = 'gds-history-modal';
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99999;display:flex;align-items:center;justify-content:center;';
        overlay.innerHTML = '<div style="background:#161b22;border:1px solid #30363d;border-radius:12px;width:90%;max-width:620px;max-height:85vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,0.4);">'
          + '<div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #30363d;"><h3 style="color:#e6edf3;font-size:18px;font-weight:700;margin:0;">Historique — ' + slug + '</h3><button id="hist-close" style="background:none;border:none;color:#8b949e;font-size:24px;cursor:pointer;">&times;</button></div>'
          + '<div id="hist-body" style="padding:20px;max-height:60vh;overflow-y:auto;"><div style="text-align:center;padding:20px;color:#8b949e;">Chargement...</div></div></div>';
        document.body.appendChild(overlay);

        var close = function() { overlay.remove(); };
        document.getElementById('hist-close').addEventListener('click', close);
        overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });

        try {
          var res = await Auth.apiFetch('/api/pages/' + slug + '/history');
          var data = await res.json();
          var history = data.history || [];
          var body = document.getElementById('hist-body');

          if (!history.length) {
            body.innerHTML = '<div style="text-align:center;padding:30px;color:#8b949e;">Aucun historique</div>';
            return;
          }

          var reasonLabels = { save: 'Sauvegarde', reorder: 'Reordonnancement', 'before-restore': 'Avant restauration' };
          var html = '';
          history.forEach(function(snap) {
            var date = new Date(snap.timestamp);
            var dateStr = date.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' }) + ' ' + date.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
            var reason = snap.reason || 'save';
            var label = reasonLabels[reason] || reason;
            if (reason.indexOf('section-edit:') === 0) label = 'Edition ' + reason.replace('section-edit:', '');
            var secs = Math.floor((Date.now() - date.getTime()) / 1000);
            var ago = secs < 60 ? "a l'instant" : secs < 3600 ? Math.floor(secs/60) + 'min' : secs < 86400 ? Math.floor(secs/3600) + 'h' : Math.floor(secs/86400) + 'j';

            html += '<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid #21262d;border-radius:8px;margin-bottom:6px;">'
              + '<div style="flex:1;"><div style="font-size:14px;font-weight:600;color:#e6edf3;">' + dateStr + ' <span style="color:#8b949e;font-weight:400;font-size:12px;">— il y a ' + ago + '</span></div>'
              + '<div style="font-size:12px;color:#8b949e;margin-top:2px;"><span style="background:#21262d;padding:1px 8px;border-radius:4px;font-weight:600;">' + label + '</span> — ' + snap.sectionsCount + ' section' + (snap.sectionsCount > 1 ? 's' : '') + '</div></div>'
              + '<div style="display:flex;gap:6px;flex-shrink:0;">'
              + '<button class="hist-restore" data-id="' + snap.id + '" style="padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #30363d;background:#21262d;color:#e6edf3;">Restaurer</button>'
              + '<button class="hist-deploy" data-id="' + snap.id + '" style="padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #E51981;background:#E51981;color:#fff;">Restaurer & Deployer</button>'
              + '</div></div>';
          });
          body.innerHTML = html;

          body.addEventListener('click', async function(e) {
            var restoreBtn = e.target.closest('.hist-restore');
            var deployBtn = e.target.closest('.hist-deploy');
            if (!restoreBtn && !deployBtn) return;
            var id = (restoreBtn || deployBtn).dataset.id;
            var withDeploy = !!deployBtn;
            var btn = restoreBtn || deployBtn;
            if (!confirm('Restaurer cette version' + (withDeploy ? ' et la deployer en production' : '') + ' ?')) return;
            btn.disabled = true;
            btn.textContent = 'Restauration...';
            try {
              var r = await Auth.apiFetch('/api/pages/' + slug + '/history/' + id + '/restore', { method: 'POST' });
              if (!r.ok) throw new Error('Echec');
              if (withDeploy) {
                btn.textContent = 'Deploiement...';
                await Auth.apiFetch('/api/deploy/shootnbox/' + slug, { method: 'POST' });
              }
              close();
              loadPage(slug);
            } catch (err) {
              alert('Erreur: ' + err.message);
              btn.disabled = false;
              btn.textContent = withDeploy ? 'Restaurer & Deployer' : 'Restaurer';
            }
          });
        } catch (err) {
          document.getElementById('hist-body').innerHTML = '<div style="text-align:center;padding:20px;color:#f85149;">Erreur: ' + err.message + '</div>';
        }
      });

      // Save
      document.getElementById('btn-save').addEventListener('click', saveChanges);

      // Publish
      document.getElementById('btn-publish').addEventListener('click', publishPage);

      // Logout
      document.getElementById('btn-logout').addEventListener('click', function() {
        Auth.apiFetch('/api/auth/logout', { method: 'POST' }).then(function() {
          window.location.href = '/login.html';
        });
      });

      // Listen for messages from iframe (postMessage API from admin-editor.js)
      window.addEventListener('message', function(event) {
        if (!event.data || event.data.source !== 'gds-editor') return;
        if (event.data.type === 'changesCount') {
          var count = event.data.count || 0;
          var badge = document.getElementById('changes-badge');
          if (count > 0) {
            badge.textContent = count + ' modif.';
            badge.classList.add('visible');
          } else {
            badge.classList.remove('visible');
          }
        }
        if (event.data.type === 'saved') {
          changes = [];
          updateChangesBadge();
        }
        if (event.data.type === 'published') {
          Components.showToast('Page publiee avec succes', 'success');
          var btn = document.getElementById('btn-publish');
          btn.disabled = false;
          btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M1 7.775V2.75C1 1.784 1.784 1 2.75 1h5.025c.464 0 .91.184 1.238.513l6.25 6.25a1.75 1.75 0 010 2.474l-5.026 5.026a1.75 1.75 0 01-2.474 0l-6.25-6.25A1.752 1.752 0 011 7.775zM5 5a1 1 0 100-2 1 1 0 000 2z"/></svg><span class="btn-label">Publier</span>';
        }
      });

      // Keyboard shortcuts
      document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
          e.preventDefault();
          saveChanges();
        }
      });

      // ==================== Init ====================

      Auth.init().then(function(user) {
        currentUser = user;
        if (!user) {
          window.location.href = '/login.html';
          return;
        }
        // Only admin can publish
        if (user.role !== 'admin') {
          document.getElementById('btn-publish').style.display = 'none';
        }

        currentSlug = getSlugFromUrl();
        loadPageList();
        loadPage(currentSlug);

        // Initialize responsive preview
        ResponsivePreview.init('editor-frame', 'responsive-toolbar', 'iframe-area');
      });
    })();
  </script>
</body>
</html>
