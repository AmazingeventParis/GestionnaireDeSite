<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionnaire de Site</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">Gestionnaire <span>de Site</span></a>
        <div class="navbar-links">
            <a href="/" class="active">Dashboard</a>
            <a href="/sites.html">Sites</a>
            <a href="/tasks.html">Taches</a>
        </div>
    </nav>

    <div class="container">
        <h1 class="page-title">Gestionnaire <span>de Site</span></h1>
        <p class="page-subtitle">Gestion centralisee de tous vos sites web</p>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="stat-sites">0</div>
                <div class="stat-label">Sites actifs</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-tasks">0</div>
                <div class="stat-label">Taches en cours</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-monitors">0</div>
                <div class="stat-label">Monitors UP</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">Total sites</div>
            </div>
        </div>

        <!-- Recent sites -->
        <div class="section">
            <div class="section-header">
                <h2 class="section-title">Sites recents</h2>
                <a href="/sites.html" class="btn btn-primary">Voir tous</a>
            </div>
            <div id="recent-sites" class="grid">
                <p class="text-muted">Chargement...</p>
            </div>
        </div>

        <!-- Recent tasks -->
        <div class="section">
            <div class="section-header">
                <h2 class="section-title">Taches recentes</h2>
                <a href="/tasks.html" class="btn btn-primary">Voir toutes</a>
            </div>
            <div id="recent-tasks">
                <p class="text-muted">Chargement...</p>
            </div>
        </div>
    </div>

    <script>
    async function loadDashboard() {
        try {
            const [statsRes, sitesRes] = await Promise.all([
                fetch('/api/stats'),
                fetch('/api/sites')
            ]);
            const stats = await statsRes.json();
            const sites = await sitesRes.json();

            document.getElementById('stat-sites').textContent = stats.active_sites;
            document.getElementById('stat-tasks').textContent = stats.pending_tasks;
            document.getElementById('stat-monitors').textContent = stats.monitors_up + '/' + stats.monitors_total;
            document.getElementById('stat-total').textContent = stats.total_sites;

            const recentEl = document.getElementById('recent-sites');
            if (sites.length === 0) {
                recentEl.innerHTML = '<p class="text-muted">Aucun site. <a href="/sites.html">Ajouter un site</a></p>';
            } else {
                recentEl.innerHTML = sites.slice(0, 6).map(function(site) {
                    var statusClass = site.status === 'active' ? 'badge-prod' :
                                     site.status === 'maintenance' ? 'badge-tool' : 'badge-infra';
                    return '<div class="card">' +
                        '<div class="card-icon">' + (site.favicon_url ? '<img src="' + site.favicon_url + '" width="32">' : '🌐') + '</div>' +
                        '<div class="card-content">' +
                            '<div class="card-name">' + site.name + ' <span class="badge ' + statusClass + '">' + site.status.toUpperCase() + '</span></div>' +
                            '<div class="card-desc">' + (site.description || '') + '</div>' +
                            '<div class="card-url">' + site.url + '</div>' +
                        '</div>' +
                    '</div>';
                }).join('');
            }

            // Load recent tasks
            if (sites.length > 0) {
                const tasksPromises = sites.slice(0, 3).map(function(s) {
                    return fetch('/api/sites/' + s.id + '/tasks').then(function(r) { return r.json(); });
                });
                const allTasks = (await Promise.all(tasksPromises)).flat()
                    .filter(function(t) { return t.status !== 'done' && t.status !== 'cancelled'; })
                    .sort(function(a, b) { return new Date(b.created_at) - new Date(a.created_at); })
                    .slice(0, 5);

                var tasksEl = document.getElementById('recent-tasks');
                if (allTasks.length === 0) {
                    tasksEl.innerHTML = '<p class="text-muted">Aucune tache en cours.</p>';
                } else {
                    tasksEl.innerHTML = '<table class="table"><thead><tr><th>Tache</th><th>Priorite</th><th>Statut</th></tr></thead><tbody>' +
                        allTasks.map(function(t) {
                            var prioClass = t.priority === 'urgent' ? 'badge-danger' :
                                           t.priority === 'high' ? 'badge-tool' : '';
                            return '<tr><td>' + t.title + '</td><td><span class="badge ' + prioClass + '">' + t.priority + '</span></td><td>' + t.status + '</td></tr>';
                        }).join('') +
                    '</tbody></table>';
                }
            } else {
                document.getElementById('recent-tasks').innerHTML = '<p class="text-muted">Aucune tache.</p>';
            }
        } catch(e) {
            console.error('Dashboard error:', e);
        }
    }
    loadDashboard();
    </script>
</body>
</html>
