<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Gestionnaire de Site</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        html, body {
            height: 100%;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d1117;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 16px;
        }

        .login-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 32px;
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            color: #e6edf3;
        }
        .login-title span {
            color: #58a6ff;
        }

        .login-subtitle {
            text-align: center;
            color: #8b949e;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .login-error {
            display: none;
            background: #f8514916;
            border: 1px solid #f8514944;
            color: #f85149;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            text-align: center;
        }
        .login-error.visible {
            display: block;
        }

        .password-wrapper {
            position: relative;
        }
        .password-wrapper .form-input {
            padding-right: 44px;
        }
        .password-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #8b949e;
            cursor: pointer;
            font-size: 13px;
            padding: 4px;
            line-height: 1;
        }
        .password-toggle:hover {
            color: #e6edf3;
        }

        .remember-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        .remember-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #58a6ff;
            cursor: pointer;
        }
        .remember-row label {
            font-size: 13px;
            color: #8b949e;
            cursor: pointer;
            user-select: none;
        }

        .login-btn {
            width: 100%;
            padding: 10px 16px;
            background: #238636;
            color: #fff;
            border: 1px solid #238636;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }
        .login-btn:hover {
            background: #2ea043;
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-footer {
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
            color: #484f58;
        }

        .login-spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff44;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }
        .login-spinner.visible {
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 24px 20px;
            }
            .login-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <h1 class="login-title">Gestionnaire <span>de Site</span></h1>
            <p class="login-subtitle">Connectez-vous pour acceder au panneau d'administration</p>

            <div id="login-error" class="login-error"></div>

            <form id="login-form" autocomplete="on">
                <div class="form-group">
                    <label class="form-label" for="email">Adresse email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        class="form-input"
                        placeholder="admin@exemple.com"
                        required
                        autocomplete="email"
                        autofocus
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Mot de passe</label>
                    <div class="password-wrapper">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-input"
                            placeholder="Votre mot de passe"
                            required
                            autocomplete="current-password"
                        >
                        <button type="button" class="password-toggle" id="toggle-password" title="Afficher le mot de passe">
                            <svg id="icon-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg id="icon-eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="remember-row">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Rester connecte</label>
                </div>

                <button type="submit" class="login-btn" id="login-btn">
                    <span id="btn-text">Se connecter</span>
                    <span id="btn-spinner" class="login-spinner"></span>
                </button>
            </form>

            <div class="login-footer">
                Tentative <span id="attempt-count">0</span>/5
            </div>
        </div>
    </div>

    <script>
    (function() {
        var attempts = 0;
        var maxAttempts = 5;
        var form = document.getElementById('login-form');
        var errorEl = document.getElementById('login-error');
        var attemptEl = document.getElementById('attempt-count');
        var btnText = document.getElementById('btn-text');
        var btnSpinner = document.getElementById('btn-spinner');
        var loginBtn = document.getElementById('login-btn');
        var passwordInput = document.getElementById('password');
        var toggleBtn = document.getElementById('toggle-password');
        var iconEye = document.getElementById('icon-eye');
        var iconEyeOff = document.getElementById('icon-eye-off');

        // Check if already logged in
        fetch('/api/auth/me', { credentials: 'same-origin' })
            .then(function(res) {
                if (res.ok) {
                    window.location.href = '/';
                }
            })
            .catch(function() {
                // Not logged in, stay on login page
            });

        // Password visibility toggle
        toggleBtn.addEventListener('click', function() {
            var isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            iconEye.style.display = isPassword ? 'none' : 'block';
            iconEyeOff.style.display = isPassword ? 'block' : 'none';
            toggleBtn.title = isPassword ? 'Masquer le mot de passe' : 'Afficher le mot de passe';
        });

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.classList.add('visible');
        }

        function hideError() {
            errorEl.classList.remove('visible');
        }

        function setLoading(loading) {
            loginBtn.disabled = loading;
            btnText.style.display = loading ? 'none' : 'inline';
            btnSpinner.classList.toggle('visible', loading);
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            hideError();

            if (attempts >= maxAttempts) {
                showError('Trop de tentatives. Veuillez reessayer plus tard.');
                return;
            }

            var email = document.getElementById('email').value.trim();
            var password = passwordInput.value;
            var remember = document.getElementById('remember').checked;

            if (!email || !password) {
                showError('Veuillez remplir tous les champs.');
                return;
            }

            setLoading(true);

            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify({ email: email, password: password, remember: remember })
            })
            .then(function(res) {
                return res.json().then(function(data) {
                    return { ok: res.ok, status: res.status, data: data };
                });
            })
            .then(function(result) {
                setLoading(false);

                if (!result.ok) {
                    attempts++;
                    attemptEl.textContent = attempts;

                    if (result.status === 429) {
                        showError('Trop de tentatives. Veuillez patienter avant de reessayer.');
                    } else if (result.status === 423) {
                        showError('Compte verrouille. Contactez un administrateur.');
                    } else {
                        showError(result.data.error || 'Email ou mot de passe incorrect.');
                    }
                    return;
                }

                // Store access token as backup for SPA navigation
                if (result.data.access_token) {
                    try {
                        sessionStorage.setItem('access_token', result.data.access_token);
                    } catch (e) {
                        // sessionStorage may be unavailable
                    }
                }

                window.location.href = '/';
            })
            .catch(function(err) {
                setLoading(false);
                attempts++;
                attemptEl.textContent = attempts;
                showError('Erreur de connexion au serveur. Veuillez reessayer.');
            });
        });
    })();
    </script>
</body>
</html>
