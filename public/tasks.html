<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taches — Gestionnaire de Site</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="navbar"></div>

    <div class="container">
        <div class="section-header">
            <h1 class="page-title">Taches</h1>
            <button class="btn btn-primary" id="btn-add-task" style="display:none" onclick="openAddTask()">+ Nouvelle tache</button>
        </div>

        <div id="tasks-list">
            <p class="text-muted">Chargement...</p>
        </div>
    </div>

    <!-- Add Task Modal -->
    <div class="modal-overlay" id="modal" style="display:none">
        <div class="modal">
            <h2 class="modal-title">Nouvelle tache</h2>
            <form id="task-form" onsubmit="saveTask(event)">
                <div class="form-group">
                    <label class="form-label">Site *</label>
                    <select class="form-select" id="task-site" required></select>
                </div>
                <div class="form-group">
                    <label class="form-label">Titre *</label>
                    <input class="form-input" id="task-title" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea class="form-textarea" id="task-desc"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Priorite</label>
                    <select class="form-select" id="task-priority">
                        <option value="low">Basse</option>
                        <option value="medium" selected>Moyenne</option>
                        <option value="high">Haute</option>
                        <option value="urgent">Urgente</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Echeance</label>
                    <input class="form-input" type="date" id="task-due">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Annuler</button>
                    <button type="submit" class="btn btn-primary">Creer</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/components.js"></script>
    <script>
    var sites = [];

    async function loadAll() {
        await Components.initPage();

        var user = Auth.getUser();
        if (user && (user.role === 'admin' || user.role === 'editor')) {
            document.getElementById('btn-add-task').style.display = '';
        }

        var res = await Auth.apiFetch('/api/sites');
        sites = await res.json();
        if (!Array.isArray(sites)) sites = [];

        if (sites.length === 0) {
            document.getElementById('tasks-list').innerHTML = '<p class="text-muted">Ajoutez d\'abord un site avant de creer des taches.</p>';
            return;
        }

        var tasksRes = await Auth.apiFetch('/api/tasks');
        var allTasks = await tasksRes.json();
        if (!Array.isArray(allTasks)) allTasks = [];

        // Map site names
        var siteMap = {};
        sites.forEach(function(s) { siteMap[s.id] = s.name; });
        allTasks.forEach(function(t) { t._site_name = siteMap[t.site_id] || 'Inconnu'; });

        allTasks.sort(function(a, b) {
            var order = { urgent: 0, high: 1, medium: 2, low: 3 };
            return (order[a.priority] || 2) - (order[b.priority] || 2);
        });

        var el = document.getElementById('tasks-list');
        if (allTasks.length === 0) {
            el.innerHTML = '<p class="text-muted">Aucune tache.</p>';
            return;
        }

        var canEdit = user && (user.role === 'admin' || user.role === 'editor');
        var canDelete = user && user.role === 'admin';

        el.innerHTML = '<table class="table"><thead><tr><th>Tache</th><th>Site</th><th>Priorite</th><th>Statut</th>' + (canEdit ? '<th>Actions</th>' : '') + '</tr></thead><tbody>' +
            allTasks.map(function(t) {
                var prioClass = t.priority === 'urgent' ? 'badge-danger' :
                               t.priority === 'high' ? 'badge-tool' : '';
                var statusClass = t.status === 'done' ? 'badge-prod' :
                                 t.status === 'in_progress' ? 'badge-tool' : '';
                var actions = '';
                if (canEdit) {
                    actions = '<td>' +
                        (t.status !== 'done' ? '<button class="btn btn-sm btn-primary" onclick="markDone(\'' + t.id + '\')">Terminer</button> ' : '') +
                        (canDelete ? '<button class="btn btn-sm btn-danger" onclick="deleteTask(\'' + t.id + '\')">Suppr.</button>' : '') +
                    '</td>';
                }
                return '<tr>' +
                    '<td>' + Components.escapeHtml(t.title) + '</td>' +
                    '<td>' + Components.escapeHtml(t._site_name) + '</td>' +
                    '<td><span class="badge ' + prioClass + '">' + Components.escapeHtml(t.priority) + '</span></td>' +
                    '<td><span class="badge ' + statusClass + '">' + Components.escapeHtml(t.status) + '</span></td>' +
                    actions +
                '</tr>';
            }).join('') +
        '</tbody></table>';
    }

    function openAddTask() {
        var select = document.getElementById('task-site');
        select.innerHTML = sites.map(function(s) {
            return '<option value="' + s.id + '">' + Components.escapeHtml(s.name) + '</option>';
        }).join('');
        document.getElementById('task-form').reset();
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }

    async function saveTask(e) {
        e.preventDefault();
        var due = document.getElementById('task-due').value;
        var res = await Auth.apiFetch('/api/tasks', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                site_id: document.getElementById('task-site').value,
                title: document.getElementById('task-title').value,
                description: document.getElementById('task-desc').value || null,
                priority: document.getElementById('task-priority').value,
                due_date: due ? new Date(due).toISOString() : null
            })
        });
        if (res.ok) {
            Components.showToast('Tache creee', 'success');
            closeModal();
            loadAll();
        } else {
            var err = await res.json();
            Components.showToast(err.error || 'Erreur', 'error');
        }
    }

    async function markDone(id) {
        var res = await Auth.apiFetch('/api/tasks/' + id, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: 'done', completed_at: new Date().toISOString() })
        });
        if (res.ok) {
            Components.showToast('Tache terminee', 'success');
            loadAll();
        }
    }

    async function deleteTask(id) {
        var confirmed = await Components.showConfirm('Supprimer cette tache ?');
        if (!confirmed) return;
        var res = await Auth.apiFetch('/api/tasks/' + id, { method: 'DELETE' });
        if (res.ok) {
            Components.showToast('Tache supprimee', 'success');
            loadAll();
        }
    }

    document.getElementById('modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    loadAll();
    </script>
</body>
</html>
