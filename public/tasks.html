<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taches — Gestionnaire de Site</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">Gestionnaire <span>de Site</span></a>
        <div class="navbar-links">
            <a href="/">Dashboard</a>
            <a href="/sites.html">Sites</a>
            <a href="/tasks.html" class="active">Taches</a>
        </div>
    </nav>

    <div class="container">
        <div class="section-header">
            <h1 class="page-title">Taches</h1>
            <button class="btn btn-primary" onclick="openAddTask()">+ Nouvelle tache</button>
        </div>

        <div id="tasks-list">
            <p class="text-muted">Chargement...</p>
        </div>
    </div>

    <!-- Add Task Modal -->
    <div class="modal-overlay" id="modal" style="display:none">
        <div class="modal">
            <h2 class="modal-title">Nouvelle tache</h2>
            <form id="task-form" onsubmit="saveTask(event)">
                <div class="form-group">
                    <label class="form-label">Site *</label>
                    <select class="form-select" id="task-site" required></select>
                </div>
                <div class="form-group">
                    <label class="form-label">Titre *</label>
                    <input class="form-input" id="task-title" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea class="form-textarea" id="task-desc"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Priorite</label>
                    <select class="form-select" id="task-priority">
                        <option value="low">Basse</option>
                        <option value="medium" selected>Moyenne</option>
                        <option value="high">Haute</option>
                        <option value="urgent">Urgente</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Echeance</label>
                    <input class="form-input" type="date" id="task-due">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Annuler</button>
                    <button type="submit" class="btn btn-primary">Creer</button>
                </div>
            </form>
        </div>
    </div>

    <script>
    var sites = [];

    async function loadAll() {
        var res = await fetch('/api/sites');
        sites = await res.json();

        if (sites.length === 0) {
            document.getElementById('tasks-list').innerHTML = '<p class="text-muted">Ajoutez d\'abord un site avant de creer des taches.</p>';
            return;
        }

        var allTasks = [];
        for (var i = 0; i < sites.length; i++) {
            var tr = await fetch('/api/sites/' + sites[i].id + '/tasks');
            var tasks = await tr.json();
            tasks.forEach(function(t) { t._site_name = sites[i].name; });
            allTasks = allTasks.concat(tasks);
        }

        allTasks.sort(function(a, b) {
            var order = { urgent: 0, high: 1, medium: 2, low: 3 };
            return (order[a.priority] || 2) - (order[b.priority] || 2);
        });

        var el = document.getElementById('tasks-list');
        if (allTasks.length === 0) {
            el.innerHTML = '<p class="text-muted">Aucune tache. Cliquez sur "+ Nouvelle tache" pour commencer.</p>';
            return;
        }

        el.innerHTML = '<table class="table"><thead><tr><th>Tache</th><th>Site</th><th>Priorite</th><th>Statut</th><th>Actions</th></tr></thead><tbody>' +
            allTasks.map(function(t) {
                var prioClass = t.priority === 'urgent' ? 'badge-danger' :
                               t.priority === 'high' ? 'badge-tool' : '';
                var statusClass = t.status === 'done' ? 'badge-prod' :
                                 t.status === 'in_progress' ? 'badge-tool' : '';
                return '<tr>' +
                    '<td>' + t.title + '</td>' +
                    '<td>' + t._site_name + '</td>' +
                    '<td><span class="badge ' + prioClass + '">' + t.priority + '</span></td>' +
                    '<td><span class="badge ' + statusClass + '">' + t.status + '</span></td>' +
                    '<td>' +
                        (t.status !== 'done' ? '<button class="btn btn-sm btn-primary" onclick="markDone(\'' + t.id + '\')">Terminer</button> ' : '') +
                        '<button class="btn btn-sm btn-danger" onclick="deleteTask(\'' + t.id + '\')">Suppr.</button>' +
                    '</td>' +
                '</tr>';
            }).join('') +
        '</tbody></table>';
    }

    function openAddTask() {
        var select = document.getElementById('task-site');
        select.innerHTML = sites.map(function(s) {
            return '<option value="' + s.id + '">' + s.name + '</option>';
        }).join('');
        document.getElementById('task-form').reset();
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }

    async function saveTask(e) {
        e.preventDefault();
        var due = document.getElementById('task-due').value;
        await fetch('/api/tasks', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                site_id: document.getElementById('task-site').value,
                title: document.getElementById('task-title').value,
                description: document.getElementById('task-desc').value || null,
                priority: document.getElementById('task-priority').value,
                due_date: due ? new Date(due).toISOString() : null
            })
        });
        closeModal();
        loadAll();
    }

    async function markDone(id) {
        await fetch('/api/tasks/' + id, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: 'done', completed_at: new Date().toISOString() })
        });
        loadAll();
    }

    async function deleteTask(id) {
        if (!confirm('Supprimer cette tache ?')) return;
        await fetch('/api/tasks/' + id, { method: 'DELETE' });
        loadAll();
    }

    document.getElementById('modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    loadAll();
    </script>
</body>
</html>
